name: Generate

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "*/30 * * * *"
  push:
    branches: ["main"]
    paths:
      - "flake.nix"
      - "README.md"
  pull_request:
    branches: ["main"]
    paths:
      - "flake.nix"
      - "README.md"
  workflow_dispatch:

jobs:
  get-projects-list:
    if: github.event_name != 'schedule' # Only run on push
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31

      - name: Get projects list
        id: list
        run: |
          PROJECTS=$(nix eval .#projectsList --json)
          echo "matrix=$PROJECTS" >> $GITHUB_OUTPUT

  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&bg_color=30,34e8ff,9e26ff&title_color=000&text_color=fff&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&locale=en&hide_title=false&layout=compact&card_width=320&langs_count=5&bg_color=30,34e8ff,9e26ff&hide_border=false&order=2&title_color=000&text_color=fff
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload stats artifacts
        uses: actions/upload-artifact@v7
        with:
          name: stats-cards
          path: profile/

  generate-pins:
    if: github.event_name != 'schedule' # Only run on push.
    runs-on: ubuntu-latest
    needs: get-projects-list
    strategy:
      matrix:
        project: ${{ fromJson(needs.get-projects-list.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate pin card for ${{ matrix.project.owner }}/${{ matrix.project.repo }}
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ matrix.project.owner }}&repo=${{ matrix.project.repo }}&bg_color=30,34e8ff,9e26ff&hide_border=false&order=2&title_color=000&text_color=fff
          path: profile/pin-${{ matrix.project.owner }}-${{ matrix.project.repo }}.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload pin card artifact
        uses: actions/upload-artifact@v7
        with:
          name: pin-${{ matrix.project.owner }}-${{ matrix.project.repo }}
          path: profile/pin-${{ matrix.project.owner }}-${{ matrix.project.repo }}.svg

  commit:
    runs-on: ubuntu-latest
    needs:
      - generate-stats
      - generate-pins
    if: always() && needs.generate-stats.result == 'success' && (needs.generate-pins.result == 'success' || needs.generate-pins.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31

      - name: Download stats cards
        uses: actions/download-artifact@v4
        with:
          name: stats-cards
          path: profile/

      - name: Clean stale pin cards
        if: github.event_name != 'schedule'
        run: find profile/ -name 'pin-*' -delete

      - name: Download all pin cards
        if: github.event_name != 'schedule'
        uses: actions/download-artifact@v4
        with:
          pattern: pin-*
          path: profile/
          merge-multiple: true

      - name: Generate README via mdsh
        run: nix develop --command mdsh

      - name: Commit everything
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: updated generated readme" || exit 0
          git push

  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=purple&color_dots=#c8f5f0,#7de8dc,#2dd4bf,#0fb8a8,#0a8c7e
            dist/snake-dark.svg?color_snake=purple&color_dots=#c8f5f0,#7de8dc,#2dd4bf,#0fb8a8,#0a8c7e&palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake.svg to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
